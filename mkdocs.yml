site_name: My Docs
site_url: https://okakaLDS.github.io/my-docs-site/

theme:
  name: material
  language: ja
  logo: images/logo.png
  favicon: images/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ライトモードに切り替え
  features:
    - navigation.top
    - navigation.expand
    - navigation.sections
    - navigation.tracking
    - navigation.indexes
    - navigation.path
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - awesome-pages
  - tags:
      tags_file: tags.md
  - llmstxt:
      sections:
        セットアップ:
          - 01-setup/*.md
        GitHub公開:
          - 02-github-publish/*.md
        ローカル開発:
          - 03-local-dev/*.md
        デザインのカスタマイズ:
          - 04-customization/*.md
